<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Tailwind CSS</title>
    <link rel="stylesheet" href="src/main.css" />
    <style>
      *{
        -webkit-box-sizing: border-box;
        -moz-box-sizing: border-box;
        box-sizing: border-box;
      }
      html{
        scroll-behavior: smooth;
      }
      body{
        font-family: 'Courier New', Courier, monospace;
      }
      ul{
        list-style: none;
        margin: 0;
        padding: 0;
      }
      a{
        text-decoration: none;
      }
      .container1{
        padding-left: 15px;
        padding-right: 15px;
        margin-left: auto;
        margin-right: auto;
      }
      .s{
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        position: relative;
      }
      @media (min-width: 768px) {
        .container1{
          width: 750px;
        }
        
      }
      @media (min-width: 992px) {
        .container1{
          width: 970px;
        }
      }
      @media (min-width: 1200px) {
        .container1{
          width: 1170px;
        }
      }
    </style>
  </head>
  <body >
    <div class="head bg-white relative shadow-cos">
      <div
        class=" container1 flex items-center justify-between flex-wrap relative">
         
      <!--px-4 mx-auto -->
        <a
          href=""
          class="text-main-co text-2xl font-bold h-18 flex justify-center items-center"
          >Logo</a
        >
        <ul class="main-nav list-none p-0 m-0 flex">
          <li class="flex">
            <a
              class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
              href="#article"
              >Article</a
            >
          </li class="flex">
          <li>
            <a
              class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
              href="#gallery"
            >
              Gallery</a
            >
          </li>
          <li>
            <a
            class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
            href="#features"
            >
              Features</a
            >
          </li>
          <li>
            <a
            class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
            href="#"
            >
              Other Options </a
            >
          </li>
        </ul>
      </div>
    </div>
   
      
                                                
  </body>
</html>
