<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Tailwind CSS</title>
    <link rel="stylesheet" href="src/main.css" />
    <style>
      html{
        scroll-behavior: smooth;
      }
      body{
        font-family: 'Courier New', Courier, monospace;
      }
      ul{
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .container1{
        padding-left: 15px;
        padding-right: 15px;
        margin-left: auto;
        margin-right: auto;
      }
      @media (min-width: 768px) {
        .container1{
          width: 750px;
        }
        
      }
      @media (min-width: 992px) {
        .container1{
          width: 970px;
        }
      }
      @media (min-width: 1200px) {
        .container1{
          width: 1170px;
        }}
    </style>
  </head>
  <body class="box-border">
   
      <div
        class="container1 px-4 mx-auto flex justify-between items-center flex-wrap relative"
      >
        <a
          href=""
          class="text-main-co text-2xl font-bold h-18 flex justify-center items-center"
          >Logo</a
        >
        <ul class="mainnav list-none p-0 m-0 flex">
          <li class="flex">
            <a
              class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
              href="#article"
              >Article</a
            >
          </li class="flex">
          <li>
            <a
              class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
              href="#gallery"
            >
              Gallery</a
            >
          </li>
          <li>
            <a
            class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
            href="#features"
            >
              Features</a
            >
          </li>
          <li>
            <a
            class=" flex justify-center items-center h-18 relative text-black px-8 duration-500 no-underline before:content-[''] before:absolute before:w-full before:h-1 before:bg-main-co before:top-0 before:-left-full hover:text-main-co hover:bg-fe before:duration-500 hover:before:left-0 overflow-hidden "
            href="#"
            >
              Other Options </a
            >
          </li>
        </ul>
      </div>
                                                
  </body>
</html>
